<!DOCTYPE html>
<html>

<head>
    <title>Factory Monitor Dashboard</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            color: #00d4ff;
        }

        .card {
            background-color: #16213e;
            border-radius: 10px;
            padding: 30px;
            margin: 20px auto;
            width: 300px;
        }
    </style>
</head>

<body>

<h1>Factory Monitor Dashboard</h1>

<div class="card">
    <h2>🌡️ Temperature</h2>
    <p id="temperature">-- °C</p>
</div>

<div class="card">
    <h2>⏲️ Pressure</h2>
    <p id="pressure">-- N/m^2</p>
</div>
<div class="card">
    <h2>📊 Status</h2>
    <p id="status">--</p>
</div>

<script>
    function fetchData() {
        fetch("/api/latest")
            .then(response => response.json())
            .then(data => {
                document.getElementById("temperature").textContent = data.temperature.value + " °C";
                document.getElementById("pressure").textContent = data.pressure.value + " bar";
                document.getElementById("status").textContent = data.status.value;
            })
    }

    fetchData();
    setInterval(fetchData, 3000);
</script>

</body>
</html>
